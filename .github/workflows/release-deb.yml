name: Build .deb package (dual-suite)

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bookworm
            container: debian:bookworm
          - target: resolute
            container: ubuntu:26.04
    runs-on: ubuntu-24.04
    container:
      image: ${{ matrix.container }}

    steps:
      - name: Bootstrap container
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl git xz-utils zstd

      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y \
            build-essential autoconf automake libtool pkg-config \
            libx11-dev libxext-dev libxinerama-dev libxrandr-dev \
            libxfixes-dev libxdamage-dev libxcomposite-dev libxcursor-dev \
            libxtst-dev libxi-dev libxkbfile-dev \
            libssl-dev libjpeg-dev zlib1g-dev \
            libvncserver-dev libavahi-client-dev


      - name: Build
        run: |
          autoreconf -fiv
          ./configure --prefix=/usr
          make -j$(nproc)


      - name: Determine version
        id: version
        run: |
          base=$(grep '^AC_INIT' configure.ac | sed 's/AC_INIT([^,]*, *//' | sed 's/[,)].*//' | tr -d '[:space:]')
          rev=${{ github.run_number }}
          echo "version=${base}-${rev}netlinux1~${{ matrix.target }}1" >> "$GITHUB_OUTPUT"
          echo "tag=v${base}-${rev}netlinux1~${{ matrix.target }}1" >> "$GITHUB_OUTPUT"


      - name: Package with checkinstall
        run: |
          apt-get install -y checkinstall
          checkinstall --default \
            --pkgname=x11vnc \
            --pkgversion="${{ steps.version.outputs.version }}" \
            --maintainer="graham@netlinux.co.uk" \
            --requires="libx11-6,libjpeg8,libssl3,libxtst6,libxdamage1,libxfixes3,libxrandr2,libvncserver1,libxinerama1" \
            --pakdir=. \
            --install=no \
            --fstrans=no \
            make install


      - name: Repack .deb for reprepro compatibility
        run: |
          DEB=$(ls x11vnc_*.deb)
          chmod 666 "$DEB"
          mkdir repack && cd repack
          ar x "../$DEB"
          for f in *.zst; do
            [ -f "$f" ] || continue
            zstd -d "$f"
            xz "${f%.zst}"
            rm "$f"
          done
          rm "../$DEB"
          ar rcs "../$DEB" debian-binary control.tar.xz data.tar.xz


      - uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.target }}
          path: |
            **/*.deb
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Compute tag
        id: tag
        run: echo "tag=v${{ github.run_number }}-dualsuite" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Build ${{ github.run_number }} (bookworm + resolute)
          body: |
            Dual-suite build from commit ${{ github.sha }}.
            Both ~bookworm1 and ~resolute1 .debs are attached.
          files: artifacts/**/*.deb
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify package repository
        run: |
          sleep 5
          PAYLOAD='{"repo":"netlinux-ai/x11vnc","tag":"${{ steps.tag.outputs.tag }}"}'
          SIGNATURE=$(echo -n "$PAYLOAD" \
            | openssl dgst -sha256 -hmac "${{ secrets.WEBHOOK_SECRET }}" -binary \
            | xxd -p -c 256)
          curl -sf -X POST \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Signature: sha256=${SIGNATURE}" \
            -d "$PAYLOAD" \
            https://packages.netlinux.co.uk/webhook/update-repo
